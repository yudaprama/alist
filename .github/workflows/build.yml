name: build

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: ubuntu-latest
            target: windows-amd64
          - platform: ubuntu-latest
            target: linux-arm64-musl
          - platform: ubuntu-latest
            target: linux-amd64-musl
          - platform: ubuntu-latest
            target: windows-arm64
          - platform: ubuntu-latest
            target: android-arm64
          - platform: macos-latest
            target: darwin-amd64
          - platform: macos-latest
            target: darwin-arm64
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.platform }}
    env:
      GOPROXY: https://proxy.golang.org,direct
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup web
        run: bash build.sh dev web

      - name: Build (Linux)
        if: runner.os == 'Linux'
        uses: go-cross/cgo-actions@v1
        with:
          targets: ${{ matrix.target }}
          musl-target-format: $os-$musl-$arch
          out-dir: build
          x-flags: |
            github.com/alist-org/alist/v3/internal/conf.BuiltAt=$built_at
            github.com/alist-org/alist/v3/internal/conf.GitAuthor=Xhofe
            github.com/alist-org/alist/v3/internal/conf.GitCommit=$git_commit
            github.com/alist-org/alist/v3/internal/conf.Version=$tag
            github.com/alist-org/alist/v3/internal/conf.WebVersion=dev

      - name: Build (macOS)
        if: runner.os == 'macOS'
        env:
          CGO_ENABLED: 1
        run: |
          os=$(echo ${{ matrix.target }} | cut -d'-' -f1)
          arch=$(echo ${{ matrix.target }} | cut -d'-' -f2)
          built_at="$(date +'%F %T %z')"
          git_commit=$(git log --pretty=format:"%h" -1)
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo dev)
          GOOS=$os GOARCH=$arch go build -o build/alist-$os-$arch \
            -ldflags "-w -s \
              -X 'github.com/alist-org/alist/v3/internal/conf.BuiltAt=$built_at' \
              -X 'github.com/alist-org/alist/v3/internal/conf.GitAuthor=Xhofe' \
              -X 'github.com/alist-org/alist/v3/internal/conf.GitCommit=$git_commit' \
              -X 'github.com/alist-org/alist/v3/internal/conf.Version=$tag' \
              -X 'github.com/alist-org/alist/v3/internal/conf.WebVersion=dev'" \
            -tags=jsoniter .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alist_${{ env.SHA }}_${{ matrix.target }}
          path: build/*