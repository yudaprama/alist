      - name: Fetch web dist
        run: |
          curl -L https://github.com/alist-org/alist-web/releases/latest/download/dist.tar.gz -o dist.tar.gz
          tar -zxvf dist.tar.gz
          rm -rf public/dist
          mv -f dist public
          rm -f dist.tar.gz

      - name: Build
        env:
          CGO_ENABLED: 1
        run: |
          os=$(echo ${{ matrix.target }} | cut -d'-' -f1)
          arch=$(echo ${{ matrix.target }} | cut -d'-' -f2)
          built_at="$(date +'%F %T %z')"
          git_author="Xhofe <i@nn.ci>"
          git_commit=$(git log --pretty=format:"%h" -1)
          version=$(git describe --abbrev=0 --tags)
          web_version=$(curl -sL "https://api.github.com/repos/alist-org/alist-web/releases/latest" | grep "tag_name" | head -n 1 | awk -F ":" '{print $2}' | sed 's/\"//g;s/,//g;s/ //g')
          mkdir -p build
          GOOS=$os GOARCH=$arch go build -o build/alist-$os-$arch \
