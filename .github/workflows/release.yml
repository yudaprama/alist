name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            musl: true
          - target: linux-arm64
            runner: ubuntu-latest
            musl: true
          - target: darwin-amd64
            runner: macos-latest
            musl: false
          - target: darwin-arm64
            runner: macos-latest
            musl: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Authenticate private deps
        env:
          DEP_TOKEN: ${{ secrets.DEP_TOKEN }}
        if: env.DEP_TOKEN != ''
        run: |
          # netrc in HOME (macOS/host builds)
          echo "machine github.com login dielzzz89 password ${DEP_TOKEN}" >> ~/.netrc
          chmod 600 ~/.netrc
          # netrc in workspace (container builds)
          echo "machine github.com login dielzzz89 password ${DEP_TOKEN}" >> ${GITHUB_WORKSPACE}/.netrc
          chmod 600 ${GITHUB_WORKSPACE}/.netrc
          go env -w GOPRIVATE=github.com/kawai-network/*
          go env -w GONOSUMCHECK=github.com/kawai-network/*
          go env -w GONOSUMDB=github.com/kawai-network/*

      - name: Determine version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v0.0.${GITHUB_RUN_NUMBER}-$(echo "${GITHUB_SHA::7}")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build (Linux, musl)
        if: matrix.musl
        uses: go-cross/cgo-actions@v1
        with:
          targets: ${{ matrix.target }}
          musl-target-format: $os-$musl-$arch
          out-dir: build
          x-flags: |
            github.com/alist-org/alist/v3/internal/conf.BuiltAt=$built_at
            github.com/alist-org/alist/v3/internal/conf.GitAuthor=Xhofe
            github.com/alist-org/alist/v3/internal/conf.GitCommit=$git_commit
            github.com/alist-org/alist/v3/internal/conf.Version=$tag
            github.com/alist-org/alist/v3/internal/conf.WebVersion=none

      - name: Build (macOS, cgo)
        if: matrix.runner == 'macos-latest'
        env:
          CGO_ENABLED: "1"
        run: |
          os=$(echo ${{ matrix.target }} | cut -d'-' -f1)
          arch=$(echo ${{ matrix.target }} | cut -d'-' -f2)
          built_at="$(date +'%F %T %z')"
          git_author="Xhofe <i@nn.ci>"
          git_commit=$(git log --pretty=format:"%h" -1)
          version=${{ steps.ver.outputs.version }}
          web_version="none"

          mkdir -p build
          GOOS=$os GOARCH=$arch go build -o build/alist-$os-$arch \
            -ldflags "-w -s \
              -X 'github.com/alist-org/alist/v3/internal/conf.BuiltAt=$built_at' \
              -X 'github.com/alist-org/alist/v3/internal/conf.GitAuthor=$git_author' \
              -X 'github.com/alist-org/alist/v3/internal/conf.GitCommit=$git_commit' \
              -X 'github.com/alist-org/alist/v3/internal/conf.Version=$version' \
              -X 'github.com/alist-org/alist/v3/internal/conf.WebVersion=$web_version'" \
            .

      - name: Pack archive
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          os=$(echo ${{ matrix.target }} | cut -d'-' -f1)
          arch=$(echo ${{ matrix.target }} | cut -d'-' -f2)
          STAGE="alist-${{ matrix.target }}"
          rm -rf "${STAGE}" && mkdir -p "${STAGE}"
          cp "build/alist-${os}-${arch}" "${STAGE}/alist"
          tar -C "${STAGE}" -czf "alist-${VERSION}-${{ matrix.target }}.tar.gz" .
          sha256sum "alist-${VERSION}-${{ matrix.target }}.tar.gz" \
            > "alist-${VERSION}-${{ matrix.target }}.tar.gz.sha256"
          ls -lh

      - uses: actions/upload-artifact@v4
        with:
          name: alist-${{ matrix.target }}
          path: |
            alist-${{ steps.ver.outputs.version }}-${{ matrix.target }}.tar.gz
            alist-${{ steps.ver.outputs.version }}-${{ matrix.target }}.tar.gz.sha256
          retention-days: 30

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Release ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.ver.outputs.is_prerelease == 'true' }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
