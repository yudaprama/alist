name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            musl: true
          - target: linux-arm64
            runner: ubuntu-latest
            musl: true
          - target: darwin-arm64
            runner: macos-latest
            musl: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Authenticate private deps
        env:
          DEP_TOKEN: ${{ secrets.DEP_TOKEN }}
        if: env.DEP_TOKEN != ''
        run: |
          # netrc in HOME (macOS/host builds)
          echo "machine github.com login dielzzz89 password ${DEP_TOKEN}" >> ~/.netrc
          chmod 600 ~/.netrc
          # GIT_ASKPASS script written to workspace (container builds)
          cat > ${GITHUB_WORKSPACE}/git-askpass.sh << GITEOF
          #!/bin/sh
          echo "${DEP_TOKEN}"
          GITEOF
          chmod +x ${GITHUB_WORKSPACE}/git-askpass.sh
          go env -w GOPRIVATE=github.com/kawai-network/*
          go env -w GONOSUMDB=github.com/kawai-network/*

      - name: Determine version
        id: ver
        run: |
          VERSION="v${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build (Linux)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          os=$(echo ${{ matrix.target }} | cut -d'-' -f1)
          arch=$(echo ${{ matrix.target }} | cut -d'-' -f2)
          built_at="$(date +'%F %T %z')"
          git_author="Xhofe <i@nn.ci>"
          git_commit=$(git log --pretty=format:"%h" -1)
          version=${{ steps.ver.outputs.version }}
          web_version="none"

          mkdir -p build
          CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -o build/alist-$os-$arch \
            -ldflags "-w -s \
              -X 'github.com/alist-org/alist/v3/internal/conf.BuiltAt=$built_at' \
              -X 'github.com/alist-org/alist/v3/internal/conf.GitAuthor=$git_author' \
              -X 'github.com/alist-org/alist/v3/internal/conf.GitCommit=$git_commit' \
              -X 'github.com/alist-org/alist/v3/internal/conf.Version=$version' \
              -X 'github.com/alist-org/alist/v3/internal/conf.WebVersion=$web_version'" .

      - name: Build (macOS, cgo)
        if: matrix.runner == 'macos-latest'
        env:
          CGO_ENABLED: "1"
        run: |
          os=$(echo ${{ matrix.target }} | cut -d'-' -f1)
          arch=$(echo ${{ matrix.target }} | cut -d'-' -f2)
          built_at="$(date +'%F %T %z')"
          git_author="Xhofe <i@nn.ci>"
          git_commit=$(git log --pretty=format:"%h" -1)
          version=${{ steps.ver.outputs.version }}
          web_version="none"

          mkdir -p build
          GOOS=$os GOARCH=$arch go build -o build/alist-$os-$arch \
            -ldflags "-w -s \
              -X 'github.com/alist-org/alist/v3/internal/conf.BuiltAt=$built_at' \
              -X 'github.com/alist-org/alist/v3/internal/conf.GitAuthor=$git_author' \
              -X 'github.com/alist-org/alist/v3/internal/conf.GitCommit=$git_commit' \
              -X 'github.com/alist-org/alist/v3/internal/conf.Version=$version' \
              -X 'github.com/alist-org/alist/v3/internal/conf.WebVersion=$web_version'" \
            .

      - name: Pack archive
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          os=$(echo ${{ matrix.target }} | cut -d'-' -f1)
          arch=$(echo ${{ matrix.target }} | cut -d'-' -f2)
          STAGE="alist-${{ matrix.target }}"
          rm -rf "${STAGE}" && mkdir -p "${STAGE}"
          cp "build/alist-${os}-${arch}" "${STAGE}/alist"
          tar -C "${STAGE}" -czf "alist-${VERSION}-${{ matrix.target }}.tar.gz" .
          sha256sum "alist-${VERSION}-${{ matrix.target }}.tar.gz" \
            > "alist-${VERSION}-${{ matrix.target }}.tar.gz.sha256"
          ls -lh

      - uses: actions/upload-artifact@v4
        with:
          name: alist-${{ matrix.target }}
          path: |
            alist-${{ steps.ver.outputs.version }}-${{ matrix.target }}.tar.gz
            alist-${{ steps.ver.outputs.version }}-${{ matrix.target }}.tar.gz.sha256
          retention-days: 30

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: ver
        run: |
          VERSION="v${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Release ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
